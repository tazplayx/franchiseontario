name: Generate Franchise Insights Post

on:
  schedule:
    # Monday 9am ET (UTC-5 in winter / UTC-4 in summer — cron uses UTC)
    - cron: '0 14 * * 1'
    # Wednesday 9am ET
    - cron: '0 14 * * 3'
    # Friday 9am ET
    - cron: '0 14 * * 5'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Optional topic override (leave blank to use next scheduled topic)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Configure git
        run: |
          git config user.name "FranchiseOntario Bot"
          git config user.email "bot@franchiseontario.com"

      - name: Commit and push if changes exist
        run: |
          git add src/data/blog-posts.json
          git diff --staged --quiet || git commit -m "content: auto-generate franchise insights post [skip ci]"
          git push
